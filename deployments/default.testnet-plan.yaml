id: 0
name: Testnet deployment
network: testnet
stacks-node: https://api.testnet.hiro.so
bitcoin-node: http://blockstack:blockstacksystem@bitcoind.testnet.stacks.co:18332
plan:
  batches:
  - id: 0
    transactions:
    # sBTC contracts are already deployed on testnet; publish them here so Clarinet
    # can resolve the requirement and validate the contract locally before broadcast.
    - transaction-type: requirement-publish
      contract-id: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT.sbtc-registry
      remap-sender: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT
      remap-principals:
        SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT
      cost: 112090
      path: .cache/requirements/SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-registry.clar
      clarity-version: 3
    - transaction-type: requirement-publish
      contract-id: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT.sbtc-token
      remap-sender: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT
      remap-principals:
        SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT
      cost: 47590
      path: .cache/requirements/SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-token.clar
      clarity-version: 3
    - transaction-type: requirement-publish
      contract-id: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT.sbtc-deposit
      remap-sender: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT
      remap-principals:
        SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT
      cost: 41510
      path: .cache/requirements/SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-deposit.clar
      clarity-version: 3
    epoch: '3.0'
  - id: 1
    transactions:
    # Deploy the main game contract.
    # Replace ST2RWQ62MFKSFSG7KNTFH90TQGVD35FE3KA6Y5BJQ with your testnet STX address before running:
    #   clarinet deployments apply --testnet
    - transaction-type: contract-publish
      contract-name: MineABitcoin
      expected-sender: ST2RWQ62MFKSFSG7KNTFH90TQGVD35FE3KA6Y5BJQ
      cost: 750000
      path: contracts/MineABitcoin.clar
      anchor-block-only: true
      clarity-version: 3
    epoch: '3.3'
  # NOTE: The contract's default sbtc var already points to the testnet sBTC address
  # (ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT.sbtc-token), so no set-sbtc call
  # is needed on testnet.
